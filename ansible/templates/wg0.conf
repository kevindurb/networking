# {{ ansible_managed }}
# WireGuard Configuration for {{ inventory_hostname }}

[Interface]
Address = {{ wireguard_address }}
{% if wireguard_listen_port is defined %}
ListenPort = {{ wireguard_listen_port }}
{% endif %}
PrivateKey = {{ wireguard_private_key }}
{% if wireguard_dns is defined %}
DNS = {{ wireguard_dns }}
{% endif %}
{% if wireguard_mtu is defined %}
MTU = {{ wireguard_mtu }}
{% endif %}
{% if wireguard_table is defined %}
Table = {{ wireguard_table }}
{% endif %}
{% if wireguard_fwmark is defined %}
FwMark = {{ wireguard_fwmark }}
{% endif %}

{% if wireguard_post_up is defined %}
PostUp = {{ wireguard_post_up }}
{% endif %}
{% if wireguard_post_down is defined %}
PostDown = {{ wireguard_post_down }}
{% endif %}
{% if wireguard_save_config is defined %}
SaveConfig = {{ wireguard_save_config | lower }}
{% endif %}

{% for peer in wireguard_peers %}
[Peer]
# {{ peer.name | default('Peer ' ~ loop.index) }}
PublicKey = {{ peer.public_key }}
{% if peer.preshared_key is defined %}
PresharedKey = {{ peer.preshared_key }}
{% endif %}
AllowedIPs = {{ peer.allowed_ips }}
{% if peer.endpoint is defined %}
Endpoint = {{ peer.endpoint }}
{% endif %}
{% if peer.persistent_keepalive is defined %}
PersistentKeepalive = {{ peer.persistent_keepalive }}
{% endif %}

{% endfor %}
