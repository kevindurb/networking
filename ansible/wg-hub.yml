---
- name: Setup Wireguard Hub
  hosts: router
  gather_facts: false
  roles:
    - community.openwrt.init
  tasks:
    - name: Gather OpenWrt facts
      community.openwrt.setup:

    - name: Install wireguard
      community.openwrt.apk:
        name: luci-proto-wireguard
        state: present

    - name: Create wireguard config dir
      community.openwrt.file:
        path: /etc/wireguard
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy over wireguard config
      community.openwrt.template:
        src: templates/wg0.conf
        dest: /etc/wireguard/wg0.conf
        owner: root
        group: root
        mode: '0600'
